global
    maxconn 1000
    log stdout format raw local0

defaults
    log global
    mode tcp
    retries 3
    timeout client 30m
    timeout connect 5s
    timeout server 30m
    timeout check 5s

resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 5s

listen postgres_write
    bind *:5000
    option httpchk
    http-check send meth GET uri /leader ver HTTP/1.1 hdr Host haproxy
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions resolvers docker init-addr libc,none
    server tsdb-primary tsdb-primary:5432 check port 8008
    server tsdb-replica tsdb-replica:5432 check port 8008

listen postgres_read
    bind *:5001
    balance roundrobin
    option httpchk
    # /read-only passes on both leader and replica; we use `backup` to prefer
    # the replica for reads and only use the leader if the replica is down.
    # (Earlier we tried /replica?lag=10MB, but the same check is applied to the
    # backup server too — and the leader fails /replica, so fallback broke.)
    http-check send meth GET uri /read-only ver HTTP/1.1 hdr Host haproxy
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions resolvers docker init-addr libc,none
    server tsdb-replica tsdb-replica:5432 check port 8008
    server tsdb-primary tsdb-primary:5432 check port 8008 backup

listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
